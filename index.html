<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FlixerX Dashboard</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0d0d1a; color: #fff; font-family: 'Segoe UI', sans-serif; min-height: 100vh; }
.navbar { background: #12122a; padding: 16px 32px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #7c3aed33; }
.logo { font-size: 22px; font-weight: bold; color: #a855f7; }
.btn { padding: 10px 24px; border-radius: 10px; border: none; cursor: pointer; font-size: 15px; font-weight: bold; transition: 0.2s; }
.btn-primary { background: #7c3aed; color: #fff; }
.btn-primary:hover { background: #a855f7; }
.btn-danger { background: #3d1a1a; color: #f87171; border: 1px solid #f8717133; }
.btn-danger:hover { background: #f87171; color: #fff; }
.container { max-width: 900px; margin: 40px auto; padding: 0 20px; }
.hero { text-align: center; padding: 60px 0 40px; }
.hero h1 { font-size: 36px; color: #a855f7; margin-bottom: 12px; }
.hero p { color: #888; font-size: 16px; }
.guilds-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 20px; margin-top: 32px; }
.guild-card { background: #12122a; border: 1px solid #7c3aed33; border-radius: 16px; padding: 24px; display: flex; flex-direction: column; align-items: center; gap: 12px; transition: 0.2s; }
.guild-card:hover { border-color: #7c3aed; transform: translateY(-2px); }
.guild-icon { width: 64px; height: 64px; border-radius: 50%; background: #7c3aed33; display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: bold; color: #a855f7; overflow: hidden; }
.guild-icon img { width: 100%; height: 100%; object-fit: cover; }
.guild-name { font-size: 16px; font-weight: bold; text-align: center; }
.badge { font-size: 11px; padding: 3px 10px; border-radius: 20px; background: #7c3aed33; color: #a855f7; }
.modal { display: none; position: fixed; inset: 0; background: #000000aa; z-index: 100; align-items: center; justify-content: center; }
.modal.active { display: flex; }
.modal-box { background: #12122a; border: 1px solid #7c3aed55; border-radius: 20px; padding: 32px; width: 90%; max-width: 460px; }
.modal-box h2 { color: #a855f7; margin-bottom: 20px; font-size: 20px; }
.input-group { margin-bottom: 16px; }
.input-group label { display: block; margin-bottom: 6px; color: #aaa; font-size: 14px; }
.input-group input { width: 100%; padding: 12px 16px; background: #0d0d1a; border: 1px solid #7c3aed44; border-radius: 10px; color: #fff; font-size: 15px; outline: none; }
.input-group input:focus { border-color: #a855f7; }
.modal-actions { display: flex; gap: 12px; margin-top: 20px; }
.loading { text-align: center; padding: 60px; color: #666; }
.alert { padding: 12px 20px; border-radius: 10px; margin-bottom: 20px; font-size: 14px; }
.alert-success { background: #1a3a1a; color: #4ade80; border: 1px solid #4ade8033; }
.alert-error { background: #3a1a1a; color: #f87171; border: 1px solid #f8717133; }
#loginSection { text-align: center; padding: 80px 20px; }
#loginSection p { color: #888; margin-bottom: 24px; font-size: 16px; }
</style>
</head>
<body>

<div class="navbar">
  <div class="logo">⚡ FlixerX</div>
  <div id="navUser"></div>
</div>

<div class="container">
  <div id="loginSection">
    <div class="hero">
      <h1>FlixerX Dashboard</h1>
      <p>سجل دخول عشان تدير سيرفراتك</p>
    </div>
    <button class="btn btn-primary" onclick="login()">تسجيل الدخول بـ Discord</button>
  </div>

  <div id="dashSection" style="display:none">
    <div id="alertBox"></div>
    <h2 style="color:#a855f7; margin-bottom:8px;">سيرفراتك</h2>
    <p style="color:#666; margin-bottom:24px; font-size:14px;">السيرفرات المشتركة بينك وبين FlixerX</p>
    <div id="guildsList" class="guilds-grid">
      <div class="loading">جاري التحميل...</div>
    </div>
  </div>
</div>

<div class="modal" id="settingsModal">
  <div class="modal-box">
    <h2>⚙️ إعدادات الاقتراحات</h2>
    <p style="color:#888; font-size:13px; margin-bottom:20px;" id="modalGuildName"></p>
    <div class="input-group">
      <label>ID قناة الاقتراحات</label>
      <input type="text" id="channelInput" placeholder="مثال: 123456789012345678">
    </div>
    <div class="modal-actions">
      <button class="btn btn-primary" onclick="saveSettings()">💾 حفظ</button>
      <button class="btn btn-danger" onclick="closeModal()">إلغاء</button>
    </div>
  </div>
</div>

<script>
const WORKER_URL = 'https://calm-meadow-991a.122007aboudiii.workers.dev';
const CLIENT_ID = '1356316450616508657';
const REDIRECT_URI = 'https://amoluff.github.io/flixerx-dashboard/callback';

let accessToken = null;
let currentGuildId = null;

async function checkCallback() {
  // قراءة الـ code من URL مباشرة أو من sessionStorage
  let search = window.location.search;
  
  // لو جاي من 404.html redirect
  if (!search) {
    search = sessionStorage.getItem('oauth_redirect') || '';
  }
  sessionStorage.removeItem('oauth_redirect');

  const params = new URLSearchParams(search);
  const code = params.get('code');
  if (!code) return false;

  window.history.replaceState({}, '', window.location.pathname);

  try {
    const res = await fetch(`${WORKER_URL}/auth/callback`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ code })
    });
    const data = await res.json();
    if (data.access_token) {
      localStorage.setItem('discord_token', data.access_token);
      accessToken = data.access_token;
      return true;
    }
  } catch(e) {
    console.error('Auth error:', e);
  }
  return false;
}

function login() {
  const params = new URLSearchParams({
    client_id: CLIENT_ID,
    redirect_uri: REDIRECT_URI,
    response_type: 'code',
    scope: 'identify guilds'
  });
  window.location.href = `https://discord.com/oauth2/authorize?${params}`;
}

function logout() {
  localStorage.removeItem('discord_token');
  location.reload();
}

function showAlert(msg, type) {
  const box = document.getElementById('alertBox');
  box.innerHTML = `<div class="alert alert-${type}">${msg}</div>`;
  setTimeout(() => box.innerHTML = '', 4000);
}

async function loadGuilds() {
  document.getElementById('loginSection').style.display = 'none';
  document.getElementById('dashSection').style.display = 'block';
  try {
    const res = await fetch(`${WORKER_URL}/guilds`, {
      headers: { Authorization: `Bearer ${accessToken}` }
    });
    const data = await res.json();
    if (!data.guilds) { logout(); return; }

    document.getElementById('navUser').innerHTML = `
      <div style="display:flex;align-items:center;gap:12px;">
        <span style="color:#aaa;font-size:14px;">${data.user.username}</span>
        <button class="btn btn-danger" onclick="logout()">خروج</button>
      </div>`;

    const list = document.getElementById('guildsList');
    if (data.guilds.length === 0) {
      list.innerHTML = '<div class="loading">ما في سيرفرات مشتركة</div>';
      return;
    }

    list.innerHTML = data.guilds.map(g => {
      const icon = g.icon
        ? `<img src="https://cdn.discordapp.com/icons/${g.id}/${g.icon}.png" alt="">`
        : g.name.charAt(0);
      return `
        <div class="guild-card">
          <div class="guild-icon">${icon}</div>
          <div class="guild-name">${g.name}</div>
          ${g.isAdmin
            ? `<span class="badge">أدمن</span><button class="btn btn-primary" style="width:100%;margin-top:4px;" onclick="openModal('${g.id}','${g.name.replace(/'/g,"\\'")}')">⚙️ الإعدادات</button>`
            : `<span class="badge" style="color:#666;background:#1a1a2e;">عضو</span>`}
        </div>`;
    }).join('');

  } catch(e) {
    showAlert('حدث خطأ في تحميل السيرفرات', 'error');
  }
}

async function openModal(guildId, guildName) {
  currentGuildId = guildId;
  document.getElementById('modalGuildName').textContent = guildName;
  document.getElementById('channelInput').value = '';
  document.getElementById('settingsModal').classList.add('active');
}

function closeModal() {
  document.getElementById('settingsModal').classList.remove('active');
  currentGuildId = null;
}

async function saveSettings() {
  const channelId = document.getElementById('channelInput').value.trim();
  if (!channelId) { showAlert('أدخل ID القناة', 'error'); return; }
  try {
    const res = await fetch(`${WORKER_URL}/guild/${currentGuildId}/settings`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ channel_id: channelId, token: accessToken })
    });
    const data = await res.json();
    if (data.success) {
      showAlert('تم الحفظ بنجاح ✅', 'success');
      closeModal();
    } else {
      showAlert('حدث خطأ: ' + data.error, 'error');
    }
  } catch(e) {
    showAlert('حدث خطأ في الاتصال', 'error');
  }
}

(async () => {
  await checkCallback();
  accessToken = localStorage.getItem('discord_token');
  if (accessToken) loadGuilds();
})();
</script>
</body>
</html>
