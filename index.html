<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FlixerX Dashboard</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #0a0a14;
  color: #fff;
  font-family: 'Segoe UI', sans-serif;
  min-height: 100vh;
}

.navbar {
  background: #0d0d1e;
  padding: 14px 28px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid #7c3aed33;
  position: sticky;
  top: 0;
  z-index: 100;
}
.logo {
  font-size: 20px;
  font-weight: bold;
  color: #a855f7;
}
.nav-right {
  display: flex;
  align-items: center;
  gap: 12px;
}
.lang-btn {
  background: #1a1a2e;
  border: 1px solid #7c3aed44;
  color: #a855f7;
  padding: 6px 14px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 13px;
  transition: 0.2s;
}
.lang-btn:hover { background: #7c3aed22; }

.btn {
  padding: 10px 22px;
  border-radius: 10px;
  border: none;
  cursor: pointer;
  font-size: 14px;
  font-weight: bold;
  transition: 0.2s;
}
.btn-primary {
  background: linear-gradient(135deg, #7c3aed, #a855f7);
  color: #fff;
}
.btn-primary:hover { opacity: 0.9; }
.btn-success {
  background: linear-gradient(135deg, #16a34a, #22c55e);
  color: #fff;
}
.btn-success:hover { opacity: 0.9; }
.btn-danger {
  background: #1a0a0a;
  color: #f87171;
  border: 1px solid #f8717133;
}
.btn-danger:hover { background: #f87171; color: #fff; }

.container {
  max-width: 960px;
  margin: 0 auto;
  padding: 0 20px;
}

#loginSection {
  text-align: center;
  padding: 100px 20px;
}
.hero h1 {
  font-size: 38px;
  background: linear-gradient(135deg, #a855f7, #7c3aed);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  margin-bottom: 14px;
}
.hero p { color: #888; font-size: 16px; margin-bottom: 32px; }

#dashSection { padding: 32px 0; }
.section-title { color: #a855f7; font-size: 22px; margin-bottom: 6px; }
.section-sub { color: #555; font-size: 14px; margin-bottom: 28px; }

.guilds-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
  gap: 18px;
}
.guild-card {
  background: #0f0f1e;
  border: 1px solid #7c3aed22;
  border-radius: 16px;
  padding: 24px 20px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
  transition: 0.2s;
}
.guild-card:hover {
  border-color: #7c3aed66;
  transform: translateY(-2px);
}
.guild-icon {
  width: 62px;
  height: 62px;
  border-radius: 50%;
  background: #7c3aed22;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  font-weight: bold;
  color: #a855f7;
  overflow: hidden;
  border: 2px solid #7c3aed33;
}
.guild-icon img { width: 100%; height: 100%; object-fit: cover; }
.guild-name {
  font-size: 15px;
  font-weight: bold;
  text-align: center;
  color: #eee;
}
.badge {
  font-size: 11px;
  padding: 3px 12px;
  border-radius: 20px;
  background: #7c3aed22;
  color: #a855f7;
  border: 1px solid #7c3aed33;
}
.badge-member {
  background: #1a1a2e;
  color: #444;
  border-color: #333;
}

.modal {
  display: none;
  position: fixed;
  inset: 0;
  background: #000000bb;
  z-index: 200;
  align-items: center;
  justify-content: center;
}
.modal.active { display: flex; }
.modal-box {
  background: #0f0f1e;
  border: 1px solid #7c3aed55;
  border-radius: 20px;
  padding: 28px;
  width: 92%;
  max-width: 520px;
  max-height: 90vh;
  overflow-y: auto;
}
.modal-box h2 { color: #a855f7; margin-bottom: 6px; font-size: 18px; }
.modal-guild-name { color: #666; font-size: 13px; margin-bottom: 20px; }

.tabs {
  display: flex;
  gap: 8px;
  margin-bottom: 20px;
  border-bottom: 1px solid #7c3aed22;
  padding-bottom: 12px;
}
.tab {
  padding: 7px 16px;
  border-radius: 8px;
  border: 1px solid transparent;
  cursor: pointer;
  font-size: 13px;
  color: #666;
  background: none;
  transition: 0.2s;
}
.tab.active {
  background: #7c3aed22;
  color: #a855f7;
  border-color: #7c3aed44;
}

.tab-content { display: none; }
.tab-content.active { display: block; }

.input-group { margin-bottom: 16px; }
.input-group label {
  display: block;
  margin-bottom: 6px;
  color: #888;
  font-size: 13px;
}

.search-box {
  width: 100%;
  padding: 10px 14px;
  background: #0a0a14;
  border: 1px solid #7c3aed44;
  border-radius: 10px 10px 0 0;
  color: #fff;
  font-size: 14px;
  outline: none;
  border-bottom: none;
}
.search-box:focus { border-color: #a855f7; }
.search-box::placeholder { color: #444; }

.channels-list {
  width: 100%;
  max-height: 200px;
  overflow-y: auto;
  background: #0a0a14;
  border: 1px solid #7c3aed44;
  border-radius: 0 0 10px 10px;
}
.channels-list::-webkit-scrollbar { width: 4px; }
.channels-list::-webkit-scrollbar-track { background: #0a0a14; }
.channels-list::-webkit-scrollbar-thumb { background: #7c3aed44; border-radius: 4px; }

.channel-item {
  padding: 9px 14px;
  cursor: pointer;
  font-size: 14px;
  color: #aaa;
  transition: 0.15s;
  display: flex;
  align-items: center;
  gap: 6px;
}
.channel-item:hover { background: #7c3aed22; color: #fff; }
.channel-item.selected { background: #7c3aed33; color: #a855f7; }
.channel-item .ch-icon { color: #555; font-size: 13px; }

.loading-channels {
  text-align: center;
  padding: 20px;
  color: #555;
  font-size: 13px;
}

.modal-actions { display: flex; gap: 10px; margin-top: 20px; }

.alert {
  padding: 11px 18px;
  border-radius: 10px;
  margin-bottom: 16px;
  font-size: 13px;
}
.alert-success { background: #0a2a0a; color: #4ade80; border: 1px solid #4ade8033; }
.alert-error { background: #2a0a0a; color: #f87171; border: 1px solid #f8717133; }

.loading { text-align: center; padding: 60px; color: #444; }

/* ─── الرتب التلقائية ─────────────────────────────────────────────────────── */
.auto-roles-layout {
  display: flex;
  gap: 14px;
}
.auto-role-panel {
  flex: 1;
  background: #0a0a14;
  border: 1px solid #7c3aed33;
  border-radius: 12px;
  padding: 14px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.auto-role-panel-title {
  font-size: 12px;
  color: #888;
  font-weight: bold;
  margin-bottom: 2px;
}
.current-role-badge {
  display: flex;
  align-items: center;
  gap: 8px;
  background: #1a1a2e;
  border: 1px solid #7c3aed33;
  border-radius: 8px;
  padding: 8px 12px;
  font-size: 13px;
  min-height: 38px;
}
.current-role-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  flex-shrink: 0;
}
.current-role-name { color: #ddd; flex: 1; }
.no-role-text { color: #444; font-size: 12px; }

.roles-list {
  width: 100%;
  max-height: 160px;
  overflow-y: auto;
  background: #0a0a14;
  border: 1px solid #7c3aed33;
  border-radius: 8px;
}
.roles-list::-webkit-scrollbar { width: 4px; }
.roles-list::-webkit-scrollbar-track { background: #0a0a14; }
.roles-list::-webkit-scrollbar-thumb { background: #7c3aed44; border-radius: 4px; }

.role-item {
  padding: 8px 12px;
  cursor: pointer;
  font-size: 13px;
  color: #aaa;
  transition: 0.15s;
  display: flex;
  align-items: center;
  gap: 8px;
}
.role-item:hover { background: #7c3aed22; color: #fff; }
.role-item.selected { background: #7c3aed33; color: #a855f7; }
.role-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  flex-shrink: 0;
}

.role-search {
  width: 100%;
  padding: 8px 12px;
  background: #0a0a14;
  border: 1px solid #7c3aed33;
  border-radius: 8px 8px 0 0;
  color: #fff;
  font-size: 13px;
  outline: none;
  border-bottom: none;
}
.role-search:focus { border-color: #a855f7; }
.role-search::placeholder { color: #444; }

.auto-role-actions {
  display: flex;
  gap: 6px;
}
.btn-sm {
  padding: 7px 14px;
  font-size: 12px;
  border-radius: 8px;
  border: none;
  cursor: pointer;
  font-weight: bold;
  transition: 0.2s;
  flex: 1;
}
.btn-sm-success {
  background: linear-gradient(135deg, #16a34a, #22c55e);
  color: #fff;
}
.btn-sm-success:hover { opacity: 0.9; }
.btn-sm-danger {
  background: #1a0a0a;
  color: #f87171;
  border: 1px solid #f8717133;
}
.btn-sm-danger:hover { background: #f87171; color: #fff; }

@media (max-width: 600px) {
  .hero h1 { font-size: 26px; }
  .navbar { padding: 12px 16px; }
  .guilds-grid { grid-template-columns: 1fr 1fr; gap: 12px; }
  .guild-card { padding: 16px 12px; }
  .auto-roles-layout { flex-direction: column; }
}
</style>
</head>
<body>

<div class="navbar">
  <div class="logo">⚡ FlixerX</div>
  <div class="nav-right">
    <button class="lang-btn" onclick="toggleLang()" id="langBtn">EN</button>
    <div id="navUser"></div>
  </div>
</div>

<div class="container">

  <div id="loginSection">
    <div class="hero">
      <h1 id="heroTitle">FlixerX Dashboard</h1>
      <p id="heroSub">سجل دخول عشان تدير سيرفراتك</p>
    </div>
    <button class="btn btn-primary" onclick="login()" id="loginBtn">تسجيل الدخول بـ Discord</button>
  </div>

  <div id="dashSection" style="display:none">
    <div id="alertBox"></div>
    <h2 class="section-title" id="sectionTitle">سيرفراتك</h2>
    <p class="section-sub" id="sectionSub">السيرفرات المشتركة بينك وبين FlixerX</p>
    <div id="guildsList" class="guilds-grid">
      <div class="loading">جاري التحميل...</div>
    </div>
  </div>

</div>

<div class="modal" id="settingsModal">
  <div class="modal-box">
    <h2 id="modalTitle">⚙️ إعدادات السيرفر</h2>
    <p class="modal-guild-name" id="modalGuildName"></p>

    <div class="tabs">
      <button class="tab active" onclick="switchTab('suggestions')" id="tabSuggestions">📝 الاقتراحات</button>
      <button class="tab" onclick="switchTab('autoRoles')" id="tabAutoRoles">🎭 الرتب التلقائية</button>
    </div>

    <!-- تاب الاقتراحات -->
    <div class="tab-content active" id="tabSuggestionsContent">
      <div class="input-group">
        <label id="channelLabel">قناة الاقتراحات</label>
        <div id="channelsContainer">
          <div class="loading-channels" id="channelsLoading">جاري تحميل القنوات...</div>
          <div id="channelPickerWrap" style="display:none">
            <input type="text" class="search-box" id="channelSearch" placeholder="🔍 ابحث عن قناة..." oninput="filterChannels()">
            <div class="channels-list" id="channelsList"></div>
          </div>
        </div>
      </div>
      <div id="alertBox2"></div>
      <div class="modal-actions">
        <button class="btn btn-success" onclick="saveSettings()" id="saveBtn">✅ إرسال</button>
        <button class="btn btn-danger" onclick="closeModal()" id="cancelBtn">إلغاء</button>
      </div>
    </div>

    <!-- تاب الرتب التلقائية -->
    <div class="tab-content" id="tabAutoRolesContent">
      <div id="autoRolesAlertBox"></div>
      <div class="auto-roles-layout">

        <!-- رتبة الأعضاء -->
        <div class="auto-role-panel">
          <div class="auto-role-panel-title">👤 رتبة الأعضاء</div>
          <div class="current-role-badge" id="currentMemberRoleBadge">
            <div class="current-role-dot" id="currentMemberRoleDot" style="background:#444"></div>
            <span class="no-role-text" id="currentMemberRoleName">لا توجد رتبة محددة</span>
          </div>
          <input type="text" class="role-search" id="memberRoleSearch" placeholder="🔍 ابحث عن رتبة..." oninput="filterRoles('member')">
          <div class="roles-list" id="memberRolesList">
            <div class="loading-channels">جاري التحميل...</div>
          </div>
          <div class="auto-role-actions">
            <button class="btn-sm btn-sm-success" onclick="saveAutoRole('member')">✅ حفظ</button>
            <button class="btn-sm btn-sm-danger" onclick="clearAutoRole('member')">🗑️ إلغاء</button>
          </div>
        </div>

        <!-- رتبة البوتات -->
        <div class="auto-role-panel">
          <div class="auto-role-panel-title">🤖 رتبة البوتات</div>
          <div class="current-role-badge" id="currentBotRoleBadge">
            <div class="current-role-dot" id="currentBotRoleDot" style="background:#444"></div>
            <span class="no-role-text" id="currentBotRoleName">لا توجد رتبة محددة</span>
          </div>
          <input type="text" class="role-search" id="botRoleSearch" placeholder="🔍 ابحث عن رتبة..." oninput="filterRoles('bot')">
          <div class="roles-list" id="botRolesList">
            <div class="loading-channels">جاري التحميل...</div>
          </div>
          <div class="auto-role-actions">
            <button class="btn-sm btn-sm-success" onclick="saveAutoRole('bot')">✅ حفظ</button>
            <button class="btn-sm btn-sm-danger" onclick="clearAutoRole('bot')">🗑️ إلغاء</button>
          </div>
        </div>

      </div>
    </div>

  </div>
</div>

<script>
const WORKER_URL = 'https://dasbord.122007aboudiii.workers.dev';
const CLIENT_ID = '1356316450616508657';
const REDIRECT_URI = 'https://amoluff.github.io/flixerx-dashboard/callback';

let accessToken = null;
let currentGuildId = null;
let currentLang = 'ar';
let allChannels = [];
let selectedChannelId = null;

// ─── الرتب التلقائية ────────────────────────────────────────────────────────
let allRoles = [];
let selectedMemberRoleId = null;
let selectedBotRoleId = null;
let currentMemberRoleId = null;
let currentBotRoleId = null;

const translations = {
  ar: {
    heroTitle: 'FlixerX Dashboard',
    heroSub: 'سجل دخول عشان تدير سيرفراتك',
    loginBtn: 'تسجيل الدخول بـ Discord',
    sectionTitle: 'سيرفراتك',
    sectionSub: 'السيرفرات المشتركة بينك وبين FlixerX',
    noGuilds: 'ما في سيرفرات مشتركة',
    admin: 'أدمن',
    member: 'عضو',
    settings: 'الإعدادات',
    modalTitle: '⚙️ إعدادات السيرفر',
    tabSuggestions: '📝 الاقتراحات',
    tabAutoRoles: '🎭 الرتب التلقائية',
    channelLabel: 'قناة الاقتراحات',
    channelsLoading: 'جاري تحميل القنوات...',
    saveBtn: '✅ إرسال',
    cancelBtn: 'إلغاء',
    logout: 'خروج',
    saveSuccess: 'تم الحفظ بنجاح ✅',
    saveError: 'حدث خطأ',
    connError: 'حدث خطأ في الاتصال',
    selectChannel: 'اختر قناة أولاً',
    searchPlaceholder: '🔍 ابحث عن قناة...',
    dir: 'rtl'
  },
  en: {
    heroTitle: 'FlixerX Dashboard',
    heroSub: 'Login to manage your servers',
    loginBtn: 'Login with Discord',
    sectionTitle: 'Your Servers',
    sectionSub: 'Servers shared between you and FlixerX',
    noGuilds: 'No shared servers',
    admin: 'Admin',
    member: 'Member',
    settings: 'Settings',
    modalTitle: '⚙️ Server Settings',
    tabSuggestions: '📝 Suggestions',
    tabAutoRoles: '🎭 Auto Roles',
    channelLabel: 'Suggestions Channel',
    channelsLoading: 'Loading channels...',
    saveBtn: '✅ Save',
    cancelBtn: 'Cancel',
    logout: 'Logout',
    saveSuccess: 'Saved successfully ✅',
    saveError: 'An error occurred',
    connError: 'Connection error',
    selectChannel: 'Please select a channel first',
    searchPlaceholder: '🔍 Search channels...',
    dir: 'ltr'
  }
};

function t(key) { return translations[currentLang][key] || key; }

function toggleLang() {
  currentLang = currentLang === 'ar' ? 'en' : 'ar';
  document.documentElement.lang = currentLang;
  document.documentElement.dir = t('dir');
  document.getElementById('langBtn').textContent = currentLang === 'ar' ? 'EN' : 'عر';
  updateTexts();
}

function updateTexts() {
  document.getElementById('heroTitle').textContent = t('heroTitle');
  document.getElementById('heroSub').textContent = t('heroSub');
  document.getElementById('loginBtn').textContent = t('loginBtn');
  document.getElementById('sectionTitle').textContent = t('sectionTitle');
  document.getElementById('sectionSub').textContent = t('sectionSub');
  document.getElementById('modalTitle').textContent = t('modalTitle');
  document.getElementById('tabSuggestions').textContent = t('tabSuggestions');
  document.getElementById('tabAutoRoles').textContent = t('tabAutoRoles');
  document.getElementById('channelLabel').textContent = t('channelLabel');
  document.getElementById('saveBtn').textContent = t('saveBtn');
  document.getElementById('cancelBtn').textContent = t('cancelBtn');
  document.getElementById('channelSearch').placeholder = t('searchPlaceholder');
}

async function checkCallback() {
  let search = window.location.search;
  if (!search) search = sessionStorage.getItem('oauth_redirect') || '';
  sessionStorage.removeItem('oauth_redirect');
  const params = new URLSearchParams(search);
  const code = params.get('code');
  if (!code) return false;
  window.history.replaceState({}, '', window.location.pathname);
  try {
    const res = await fetch(`${WORKER_URL}/auth/callback`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ code })
    });
    const data = await res.json();
    if (data.access_token) {
      localStorage.setItem('discord_token', data.access_token);
      accessToken = data.access_token;
      return true;
    }
  } catch(e) { console.error('Auth error:', e); }
  return false;
}

function login() {
  const params = new URLSearchParams({
    client_id: CLIENT_ID,
    redirect_uri: REDIRECT_URI,
    response_type: 'code',
    scope: 'identify guilds'
  });
  window.location.href = `https://discord.com/oauth2/authorize?${params}`;
}

function logout() {
  localStorage.removeItem('discord_token');
  location.reload();
}

function showAlert(msg, type) {
  const box = document.getElementById('alertBox');
  box.innerHTML = `<div class="alert alert-${type}">${msg}</div>`;
  setTimeout(() => box.innerHTML = '', 4000);
}

function showAutoRolesAlert(msg, type) {
  const box = document.getElementById('autoRolesAlertBox');
  box.innerHTML = `<div class="alert alert-${type}">${msg}</div>`;
  setTimeout(() => box.innerHTML = '', 4000);
}

async function loadGuilds() {
  document.getElementById('loginSection').style.display = 'none';
  document.getElementById('dashSection').style.display = 'block';
  try {
    const res = await fetch(`${WORKER_URL}/guilds`, {
      headers: { Authorization: `Bearer ${accessToken}` }
    });
    const data = await res.json();
    if (!data.guilds) { logout(); return; }

    document.getElementById('navUser').innerHTML = `
      <div style="display:flex;align-items:center;gap:10px;">
        <span style="color:#777;font-size:13px;">${data.user.username}</span>
        <button class="btn btn-danger" onclick="logout()" style="padding:7px 14px;font-size:13px;">${t('logout')}</button>
      </div>`;

    const list = document.getElementById('guildsList');
    if (data.guilds.length === 0) {
      list.innerHTML = `<div class="loading">${t('noGuilds')}</div>`;
      return;
    }

    list.innerHTML = data.guilds.map(g => {
      const icon = g.icon
        ? `<img src="https://cdn.discordapp.com/icons/${g.id}/${g.icon}.png" alt="">`
        : g.name.charAt(0);
      return `
        <div class="guild-card">
          <div class="guild-icon">${icon}</div>
          <div class="guild-name">${g.name}</div>
          ${g.isAdmin
            ? `<span class="badge">${t('admin')}</span>
               <button class="btn btn-primary" style="width:100%;margin-top:4px;font-size:13px;" onclick="openModal('${g.id}','${g.name.replace(/'/g,"\\'")}')">⚙️ ${t('settings')}</button>`
            : `<span class="badge badge-member">${t('member')}</span>`}
        </div>`;
    }).join('');

  } catch(e) {
    showAlert(t('connError'), 'error');
  }
}

function filterChannels() {
  const q = document.getElementById('channelSearch').value.toLowerCase();
  const filtered = allChannels.filter(c => c.name.toLowerCase().includes(q));
  renderChannels(filtered);
}

function renderChannels(channels) {
  const list = document.getElementById('channelsList');
  if (channels.length === 0) {
    list.innerHTML = `<div class="loading-channels" style="padding:12px">ما في نتائج</div>`;
    return;
  }
  list.innerHTML = channels.map(ch => `
    <div class="channel-item ${selectedChannelId === ch.id ? 'selected' : ''}" onclick="selectChannel('${ch.id}', '${ch.name.replace(/'/g,"\\'")}')">
      <span class="ch-icon">#</span> ${ch.name}
    </div>
  `).join('');
}

function selectChannel(id, name) {
  selectedChannelId = id;
  renderChannels(allChannels.filter(c => c.name.toLowerCase().includes(
    document.getElementById('channelSearch').value.toLowerCase()
  )));
}

async function openModal(guildId, guildName) {
  currentGuildId = guildId;
  selectedChannelId = null;
  allChannels = [];
  allRoles = [];
  selectedMemberRoleId = null;
  selectedBotRoleId = null;

  document.getElementById('modalGuildName').textContent = guildName;
  document.getElementById('channelPickerWrap').style.display = 'none';
  document.getElementById('channelsLoading').style.display = 'block';
  document.getElementById('channelsLoading').textContent = t('channelsLoading');
  document.getElementById('channelSearch').value = '';
  document.getElementById('memberRoleSearch').value = '';
  document.getElementById('botRoleSearch').value = '';
  document.getElementById('memberRolesList').innerHTML = '<div class="loading-channels">جاري التحميل...</div>';
  document.getElementById('botRolesList').innerHTML = '<div class="loading-channels">جاري التحميل...</div>';
  document.getElementById('settingsModal').classList.add('active');

  // تحميل القنوات والرتب معاً
  const [channelsRes, rolesRes, autoRolesRes] = await Promise.allSettled([
    fetch(`${WORKER_URL}/guild/${guildId}/channels`, { headers: { Authorization: `Bearer ${accessToken}` } }),
    fetch(`${WORKER_URL}/guild/${guildId}/roles`, { headers: { Authorization: `Bearer ${accessToken}` } }),
    fetch(`${WORKER_URL}/guild/${guildId}/auto-roles`, { headers: { Authorization: `Bearer ${accessToken}` } })
  ]);

  // معالجة القنوات
  try {
    const data = await channelsRes.value.json();
    if (data.channels && data.channels.length > 0) {
      allChannels = data.channels;
      renderChannels(allChannels);
      document.getElementById('channelsLoading').style.display = 'none';
      document.getElementById('channelPickerWrap').style.display = 'block';
    } else {
      document.getElementById('channelsLoading').textContent = 'ما في قنوات';
    }
  } catch(e) {
    document.getElementById('channelsLoading').textContent = t('connError');
  }

  // معالجة الرتب الحالية
  try {
    const autoData = await autoRolesRes.value.json();
    currentMemberRoleId = autoData.member_role_id || null;
    currentBotRoleId = autoData.bot_role_id || null;
  } catch(e) {
    currentMemberRoleId = null;
    currentBotRoleId = null;
  }

  // معالجة قائمة الرتب
  try {
    const rolesData = await rolesRes.value.json();
    if (rolesData.roles && rolesData.roles.length > 0) {
      allRoles = rolesData.roles;
      updateCurrentRoleDisplay('member');
      updateCurrentRoleDisplay('bot');
      renderRoles('member', allRoles);
      renderRoles('bot', allRoles);
    } else {
      document.getElementById('memberRolesList').innerHTML = '<div class="loading-channels">ما في رتب</div>';
      document.getElementById('botRolesList').innerHTML = '<div class="loading-channels">ما في رتب</div>';
    }
  } catch(e) {
    document.getElementById('memberRolesList').innerHTML = '<div class="loading-channels">حدث خطأ</div>';
    document.getElementById('botRolesList').innerHTML = '<div class="loading-channels">حدث خطأ</div>';
  }
}

function roleColor(color) {
  if (!color || color === 0) return '#444';
  return '#' + color.toString(16).padStart(6, '0');
}

function updateCurrentRoleDisplay(type) {
  const currentId = type === 'member' ? currentMemberRoleId : currentBotRoleId;
  const dotEl = document.getElementById(type === 'member' ? 'currentMemberRoleDot' : 'currentBotRoleDot');
  const nameEl = document.getElementById(type === 'member' ? 'currentMemberRoleName' : 'currentBotRoleName');
  if (currentId) {
    const role = allRoles.find(r => r.id === currentId);
    if (role) {
      dotEl.style.background = roleColor(role.color);
      nameEl.textContent = role.name;
      nameEl.className = 'current-role-name';
    }
  } else {
    dotEl.style.background = '#444';
    nameEl.textContent = type === 'member' ? 'لا توجد رتبة محددة' : 'لا توجد رتبة محددة';
    nameEl.className = 'no-role-text';
  }
}

function filterRoles(type) {
  const searchId = type === 'member' ? 'memberRoleSearch' : 'botRoleSearch';
  const q = document.getElementById(searchId).value.toLowerCase();
  const filtered = allRoles.filter(r => r.name.toLowerCase().includes(q));
  renderRoles(type, filtered);
}

function renderRoles(type, roles) {
  const listId = type === 'member' ? 'memberRolesList' : 'botRolesList';
  const selectedId = type === 'member' ? selectedMemberRoleId : selectedBotRoleId;
  const list = document.getElementById(listId);
  if (roles.length === 0) {
    list.innerHTML = '<div class="loading-channels" style="padding:10px">ما في نتائج</div>';
    return;
  }
  list.innerHTML = roles.map(r => `
    <div class="role-item ${selectedId === r.id ? 'selected' : ''}" onclick="selectRole('${type}','${r.id}')">
      <div class="role-dot" style="background:${roleColor(r.color)}"></div>
      ${r.name}
    </div>
  `).join('');
}

function selectRole(type, id) {
  if (type === 'member') {
    selectedMemberRoleId = id;
    renderRoles('member', allRoles.filter(r => r.name.toLowerCase().includes(
      document.getElementById('memberRoleSearch').value.toLowerCase()
    )));
  } else {
    selectedBotRoleId = id;
    renderRoles('bot', allRoles.filter(r => r.name.toLowerCase().includes(
      document.getElementById('botRoleSearch').value.toLowerCase()
    )));
  }
}

async function saveAutoRole(type) {
  const selectedId = type === 'member' ? selectedMemberRoleId : selectedBotRoleId;
  if (!selectedId) {
    showAutoRolesAlert(type === 'member' ? 'اختر رتبة للأعضاء أولاً' : 'اختر رتبة للبوتات أولاً', 'error');
    return;
  }
  try {
    const body = {
      member_role_id: type === 'member' ? selectedId : currentMemberRoleId,
      bot_role_id: type === 'bot' ? selectedId : currentBotRoleId
    };
    const res = await fetch(`${WORKER_URL}/guild/${currentGuildId}/auto-roles`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${accessToken}` },
      body: JSON.stringify(body)
    });
    const data = await res.json();
    if (data.success) {
      if (type === 'member') currentMemberRoleId = selectedId;
      else currentBotRoleId = selectedId;
      updateCurrentRoleDisplay(type);
      showAutoRolesAlert('تم الحفظ بنجاح ✅', 'success');
    } else {
      showAutoRolesAlert(`${t('saveError')}: ${data.error}`, 'error');
    }
  } catch(e) {
    showAutoRolesAlert(t('connError'), 'error');
  }
}

async function clearAutoRole(type) {
  try {
    const body = {
      member_role_id: type === 'member' ? null : currentMemberRoleId,
      bot_role_id: type === 'bot' ? null : currentBotRoleId
    };
    const res = await fetch(`${WORKER_URL}/guild/${currentGuildId}/auto-roles`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${accessToken}` },
      body: JSON.stringify(body)
    });
    const data = await res.json();
    if (data.success) {
      if (type === 'member') { currentMemberRoleId = null; selectedMemberRoleId = null; }
      else { currentBotRoleId = null; selectedBotRoleId = null; }
      updateCurrentRoleDisplay(type);
      renderRoles(type, allRoles);
      showAutoRolesAlert('تم الإلغاء بنجاح ✅', 'success');
    } else {
      showAutoRolesAlert(`${t('saveError')}: ${data.error}`, 'error');
    }
  } catch(e) {
    showAutoRolesAlert(t('connError'), 'error');
  }
}

function closeModal() {
  document.getElementById('settingsModal').classList.remove('active');
  currentGuildId = null;
  selectedChannelId = null;
  selectedMemberRoleId = null;
  selectedBotRoleId = null;
  switchTab('suggestions');
}

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  const key = tab.charAt(0).toUpperCase() + tab.slice(1);
  document.getElementById(`tab${key}`).classList.add('active');
  document.getElementById(`tab${key}Content`).classList.add('active');
}

async function saveSettings() {
  if (!selectedChannelId) { showAlert(t('selectChannel'), 'error'); return; }
  try {
    const res = await fetch(`${WORKER_URL}/guild/${currentGuildId}/settings`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${accessToken}`
      },
      body: JSON.stringify({ channel_id: selectedChannelId })
    });
    const data = await res.json();
    if (data.success) {
      showAlert(t('saveSuccess'), 'success');
      closeModal();
    } else {
      showAlert(`${t('saveError')}: ${data.error}`, 'error');
    }
  } catch(e) {
    showAlert(t('connError'), 'error');
  }
}

(async () => {
  await checkCallback();
  accessToken = localStorage.getItem('discord_token');
  if (accessToken) loadGuilds();
})();
</script>
